<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FAF8F4; font-family: 'DM Sans', sans-serif; padding: 20px 24px; display: flex; gap: 16px; -webkit-font-smoothing: antialiased; }
</style></head><body>

<!-- Watch Card — Default -->
<div style="background:#FFFFFF;border:1px solid #E8E2D8;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(26,20,16,0.04);width:176px;">
  <div style="background:#FAF8F4;aspect-ratio:4/3;border-bottom:1px solid #E8E2D8;display:flex;align-items:center;justify-content:center;">
    <svg width="80" height="80" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="44" fill="#F5F0E8" stroke="#D4CBBF" stroke-width="1.5"/>
      <circle cx="50" cy="50" r="36" fill="none" stroke="#1A1410" stroke-width="0.8" opacity="0.15"/>
      <circle cx="50" cy="50" r="2" fill="#1A1410"/>
      <line x1="50" y1="16" x2="50" y2="50" stroke="#1A1410" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="67" y2="59" stroke="#1A1410" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <div style="padding:14px 16px 16px;">
    <div style="font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#C9A84C;margin-bottom:4px;">Longines</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:#1A1410;line-height:1.15;margin-bottom:4px;">Legend Diver</div>
    <div style="font-size:11px;color:#A89880;margin-bottom:2px;">Ref. L3.764.4.16.6</div>
    <div style="font-size:11px;color:#A89880;margin-bottom:10px;">42mm · White</div>
    <span style="display:inline-block;font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;background:#2A2520;color:#FAF8F4;padding:3px 9px;border-radius:20px;margin-bottom:10px;">Diver</span>
    <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:#1A1410;margin-bottom:10px;">$1,350</div>
    <span style="font-size:9px;font-weight:600;letter-spacing:0.06em;padding:3px 10px;border-radius:20px;background:#E8F4E8;color:#2D6A2D;">Owned</span>
  </div>
</div>

<!-- Watch Card — Hovered/Active -->
<div style="background:#FFFFFF;border:2px solid rgba(201,168,76,0.8);border-radius:10px;overflow:hidden;box-shadow:0 0 0 1px rgba(201,168,76,0.4),0 6px 24px rgba(201,168,76,0.12);width:176px;transform:translateY(-2px);">
  <div style="background:#FAF8F4;aspect-ratio:4/3;border-bottom:1px solid #E8E2D8;display:flex;align-items:center;justify-content:center;">
    <svg width="80" height="80" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="44" fill="#1B2A4A" stroke="#C9A84C" stroke-width="1.5"/>
      <circle cx="50" cy="50" r="36" fill="none" stroke="#FAF8F4" stroke-width="0.8" opacity="0.2"/>
      <circle cx="50" cy="50" r="2" fill="#FAF8F4"/>
      <line x1="50" y1="16" x2="50" y2="50" stroke="#FAF8F4" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="67" y2="59" stroke="#FAF8F4" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <div style="padding:14px 16px 16px;">
    <div style="font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#C9A84C;margin-bottom:4px;">Longines</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:#1A1410;line-height:1.15;margin-bottom:4px;">Legend Diver</div>
    <div style="font-size:11px;color:#A89880;margin-bottom:2px;">Ref. L3.764.4.96.6</div>
    <div style="font-size:11px;color:#A89880;margin-bottom:10px;">42mm · Navy Blue</div>
    <span style="display:inline-block;font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;background:#2A2520;color:#FAF8F4;padding:3px 9px;border-radius:20px;margin-bottom:10px;">Diver</span>
    <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:#1A1410;margin-bottom:10px;">$1,380</div>
    <span style="font-size:9px;font-weight:600;letter-spacing:0.06em;padding:3px 10px;border-radius:20px;background:#E8F0FA;color:#1A4A8A;">Recently Added</span>
  </div>
</div>

</body></html>
