<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FAF8F4; font-family: 'DM Sans', sans-serif; padding: 24px 28px; -webkit-font-smoothing: antialiased; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.row:last-child { margin-bottom: 0; }
.label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #A89880; min-width: 72px; }
button, a.btn {
  font-family: 'DM Sans', sans-serif; cursor: pointer; display: inline-block;
  font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-decoration: none;
}
</style></head><body>

<div class="row">
  <span class="label">Primary</span>
  <button style="padding:12px 28px;background:#1A1410;color:#FAF8F4;border:none;border-radius:4px;">Build Your Box</button>
  <button style="padding:9px 22px;background:#1A1410;color:#FAF8F4;border:none;border-radius:4px;">Sign In</button>
  <button style="padding:7px 18px;background:#1A1410;color:#FAF8F4;border:none;border-radius:4px;text-transform:uppercase;font-size:11px;">Add Watch</button>
</div>

<div class="row">
  <span class="label">Secondary</span>
  <button style="padding:12px 28px;background:transparent;color:#1A1410;border:1px solid #D4CBBF;border-radius:4px;">Explore Watches</button>
  <button style="padding:9px 22px;background:transparent;color:#1A1410;border:1px solid #D4CBBF;border-radius:4px;">Open Playground</button>
  <button style="padding:9px 18px;background:transparent;color:#1A1410;border:1px solid #D4CBBF;border-radius:4px;">Sell This Watch</button>
</div>

<div class="row">
  <span class="label">Outline</span>
  <button style="padding:9px 18px;background:transparent;color:#1A1410;border:1px solid #E8E2D8;border-radius:6px;width:100%;max-width:200px;text-align:center;">Swap Strap</button>
  <a class="btn" href="#" style="padding:9px 18px;background:#1A1410;color:#FAF8F4;border-radius:4px;text-align:center;">Find For Sale ↗</a>
</div>

<div class="row">
  <span class="label">Value pill</span>
  <span style="font-size:11px;font-weight:500;letter-spacing:0.06em;padding:5px 14px;border-radius:20px;border:1px solid rgba(201,168,76,0.4);background:rgba(201,168,76,0.06);color:#C9A84C;">Est. Value: $6,730</span>
  <span style="font-size:11px;color:#C9A84C;letter-spacing:0.02em;opacity:0.85;">3 unsaved changes</span>
</div>

</body></html>
