<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FAF8F4; font-family: 'DM Sans', sans-serif; padding: 24px 28px; -webkit-font-smoothing: antialiased; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid #EAE5DC; }
.row:last-child { border-bottom: none; }
.meta { font-size: 9px; color: #A89880; letter-spacing: 0.08em; text-transform: uppercase; min-width: 88px; }
</style></head><body>
<div class="row">
  <span class="meta">Hero / 300</span>
  <span style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;line-height:1;letter-spacing:-0.01em;color:#1A1410;">Showcase Your <em>Timepieces.</em></span>
</div>
<div class="row">
  <span class="meta">H2 / 400</span>
  <span style="font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;line-height:1.15;color:#1A1410;">Everything a <em>Collector Needs.</em></span>
</div>
<div class="row">
  <span class="meta">Sidebar / 500</span>
  <span style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;line-height:1.1;color:#1A1410;">Legend Diver</span>
</div>
<div class="row">
  <span class="meta">Card title</span>
  <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:#1A1410;">Playground Mode</span>
</div>
<div class="row">
  <span class="meta">Nav logo</span>
  <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;letter-spacing:0.03em;color:#1A1410;">Virtual Watchbox</span>
</div>
</body></html>
