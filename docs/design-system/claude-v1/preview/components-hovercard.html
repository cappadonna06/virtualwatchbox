<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #EDE9E2; font-family: 'DM Sans', sans-serif; padding: 24px; display: flex; gap: 20px; align-items: flex-start; -webkit-font-smoothing: antialiased; }
</style></head><body>

<!-- Hover card -->
<div style="background:#FFFCF7;border:1px solid #E8E2D8;border-radius:10px;padding:12px;width:180px;box-shadow:0 8px 24px rgba(26,20,16,0.13);">
  <p style="font-size:9px;color:#A89880;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;">LONGINES</p>
  <p style="font-family:'Cormorant Garamond',serif;font-size:16px;color:#1A1410;font-weight:500;line-height:1.2;margin-bottom:3px;">Legend Diver</p>
  <p style="font-size:10px;color:#A89880;margin-bottom:10px;">Ref. L3.764.4.16.6</p>
  <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #E8E2D8;padding-top:8px;">
    <span style="font-size:10px;color:#A89880;">42mm</span>
    <span style="font-size:12px;color:#C9A84C;font-weight:600;">$1,350</span>
  </div>
  <p style="font-size:9px;color:#A89880;margin-top:5px;text-align:right;">Click to expand ↗</p>
</div>

<!-- Value pill in dark context -->
<div style="background:linear-gradient(160deg,#1e1b16,#2a2420);border-radius:10px;padding:20px;width:220px;position:relative;">
  <div style="font-size:9px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(201,168,76,0.85);margin-bottom:4px;">LONGINES</div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:#FAF8F4;font-weight:400;line-height:1.1;margin-bottom:16px;">Legend Diver</div>
  <div style="background:rgba(20,16,12,0.72);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;backdrop-filter:blur(10px);display:inline-block;">
    <div style="font-size:17px;font-weight:600;color:#C9A84C;line-height:1;">$1,350</div>
    <div style="font-size:9px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:4px;">White Lacquer</div>
  </div>
</div>

</body></html>
