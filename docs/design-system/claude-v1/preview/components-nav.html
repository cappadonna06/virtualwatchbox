<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FAF8F4; -webkit-font-smoothing: antialiased; }
</style></head><body>
<nav style="border-bottom:1px solid #EAE5DC;background:#FAF8F4;padding:20px 40px;">
  <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
    <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;letter-spacing:0.03em;color:#1A1410;">Virtual Watchbox</span>
    <div style="display:flex;gap:32px;">
      <a style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;color:#A89880;text-decoration:none;">My Collection</a>
      <a style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;color:#A89880;text-decoration:none;">Playground</a>
      <a style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;color:#A89880;text-decoration:none;">Discover</a>
      <a style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;color:#A89880;text-decoration:none;">News</a>
    </div>
    <button style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.08em;padding:9px 22px;background:#1A1410;color:#FAF8F4;border:none;border-radius:4px;cursor:pointer;">Sign In</button>
  </div>
</nav>

<!-- Active state variant -->
<nav style="border-bottom:1px solid #EAE5DC;background:#FAF8F4;padding:20px 40px;margin-top:1px;">
  <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
    <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;letter-spacing:0.03em;color:#1A1410;">Virtual Watchbox</span>
    <div style="display:flex;gap:32px;align-items:center;">
      <a style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.04em;color:#1A1410;text-decoration:none;border-bottom:1px solid #1A1410;padding-bottom:1px;">My Collection</a>
      <a style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;color:#A89880;text-decoration:none;">Playground</a>
      <a style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;color:#A89880;text-decoration:none;">Discover</a>
      <a style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;color:#A89880;text-decoration:none;">News</a>
    </div>
    <button style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.08em;padding:9px 22px;background:#1A1410;color:#FAF8F4;border:none;border-radius:4px;cursor:pointer;">Sign In</button>
  </div>
</nav>
<div style="padding:8px 40px;font-family:'DM Sans',sans-serif;font-size:9px;color:#A89880;letter-spacing:0.06em;">↑ Default &nbsp;&nbsp; Active page state</div>
</body></html>
