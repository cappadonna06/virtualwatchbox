<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FAF8F4; font-family: 'DM Sans', sans-serif; padding: 20px 24px; }
.section { margin-bottom: 14px; }
.label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #A89880; margin-bottom: 7px; }
.row { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.badge { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; }
.tag { display: inline-block; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; padding: 4px 12px; border-radius: 20px; border: 1px solid #D4CBBF; color: #1A1410; }
</style></head><body>
<div class="section">
  <div class="label">Ownership Status</div>
  <div class="row">
    <span class="badge" style="background:#E8F4E8;color:#2D6A2D;">Owned</span>
    <span class="badge" style="background:#FFF8E6;color:#8A6A10;">For Sale</span>
    <span class="badge" style="background:#E8F0FA;color:#1A4A8A;">Recently Added</span>
    <span class="badge" style="background:#FFF3E0;color:#8A5010;">Needs Service</span>
  </div>
</div>
<div class="section">
  <div class="label">Condition</div>
  <div class="row">
    <span class="badge" style="background:#E8F4E8;color:#2D6A2D;">Unworn</span>
    <span class="badge" style="background:#EDF4E8;color:#3A6A2D;">Like New</span>
    <span class="badge" style="background:#FFF8E6;color:#8A6A10;">Excellent</span>
    <span class="badge" style="background:#FDF0E0;color:#8A5010;">Good</span>
    <span class="badge" style="background:#FAE8E8;color:#8A2020;">Fair</span>
  </div>
</div>
<div class="section">
  <div class="label">Watch Type</div>
  <div class="row">
    <span class="badge" style="background:#2A2520;color:#FAF8F4;">Diver</span>
    <span class="badge" style="background:#2A2520;color:#FAF8F4;">Dress</span>
    <span class="badge" style="background:#2A2520;color:#FAF8F4;">Chronograph</span>
    <span class="badge" style="background:#2A2520;color:#FAF8F4;">GMT</span>
    <span class="badge" style="background:#2A2520;color:#FAF8F4;">Pilot</span>
    <span class="badge" style="background:#2A2520;color:#FAF8F4;">Field</span>
    <span class="badge" style="background:#2A2520;color:#FAF8F4;">Vintage</span>
  </div>
</div>
<div class="section" style="margin-bottom:0">
  <div class="label">Playground Tags</div>
  <div class="row">
    <span class="tag">Dream Box</span>
    <span class="tag">Under $10K</span>
    <span class="tag">Travel</span>
    <span class="tag">Dress</span>
    <span class="tag">GMT Only</span>
    <span class="tag">Vintage</span>
    <span class="tag">Color Study</span>
  </div>
</div>
</body></html>
