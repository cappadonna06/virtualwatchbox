<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Collection — Virtual Watchbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: #FAF8F4;
    color: #1A1410;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #FAF8F4; }
  ::-webkit-scrollbar-thumb { background: #D4CBBF; border-radius: 3px; }
  button { font: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="WatchData.jsx"></script>
<script type="text/babel" src="NavBar.jsx"></script>
<script type="text/babel" src="WatchSidebar.jsx"></script>
<script type="text/babel" src="WatchBoxGrid.jsx"></script>
<script type="text/babel" src="CollectionPage.jsx"></script>
<script type="text/babel" src="CollectionStats.jsx"></script>
<script type="text/babel" src="ShareBox.jsx"></script>
<script type="text/babel" src="CollectionPageRoot.jsx"></script>

<script type="text/babel" data-presets="env,react">
(function mount() {
  if (!window.NavBar || !window.CollectionPageRoot) {
    return setTimeout(mount, 30);
  }
  const App = () => {
    const [page, setPage] = React.useState('collection');
    return React.createElement('div', null,
      React.createElement(window.NavBar, { page, setPage }),
      React.createElement(window.CollectionPageRoot, { setPage })
    );
  };
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
})();
</script>
</body>
</html>
